name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target

      - name: Install dependencies
        run: npm ci

      - name: Check Rust formatting
        working-directory: native
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: native
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: native
        run: cargo test

      - name: Build native module
        working-directory: native
        run: |
          cargo build --release
          npx napi build --release --platform

      - name: Build TypeScript
        run: npm run build:ts

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Start mock embeddings server for eval smoke
        run: |
          node scripts/eval-mock-embeddings-server.mjs > /tmp/eval-mock-embeddings.log 2>&1 &
          echo $! > /tmp/eval-mock-embeddings.pid
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:11434/health >/dev/null; then
              echo "Mock embeddings server is healthy"
              break
            fi
            sleep 0.25
          done

      - name: Run eval harness smoke check (mock embeddings)
        run: npm run eval:smoke

      - name: Stop mock embeddings server
        if: always()
        run: |
          if [ -f /tmp/eval-mock-embeddings.pid ]; then
            kill "$(cat /tmp/eval-mock-embeddings.pid)" || true
          fi
