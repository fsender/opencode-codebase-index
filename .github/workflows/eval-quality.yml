name: Eval Quality Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  eval-quality:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          workspaces: native -> target

      - name: Install dependencies
        run: npm ci

      - name: Build native module
        working-directory: native
        run: |
          cargo build --release
          npx napi build --release --platform

      - name: Ensure eval baseline exists
        run: |
          if [ ! -f benchmarks/baselines/eval-baseline-summary.json ]; then
            echo "Missing benchmarks/baselines/eval-baseline-summary.json"
            exit 1
          fi

      - name: Create eval quality config from secrets
        env:
          EVAL_EMBED_BASE_URL: ${{ secrets.EVAL_EMBED_BASE_URL }}
          EVAL_EMBED_API_KEY: ${{ secrets.EVAL_EMBED_API_KEY }}
          EVAL_EMBED_MODEL: ${{ secrets.EVAL_EMBED_MODEL }}
          EVAL_EMBED_DIMENSIONS: ${{ secrets.EVAL_EMBED_DIMENSIONS }}
        run: |
          if [ -z "$EVAL_EMBED_BASE_URL" ]; then
            echo "Missing secret: EVAL_EMBED_BASE_URL"
            exit 1
          fi
          if [ -z "$EVAL_EMBED_API_KEY" ]; then
            echo "Missing secret: EVAL_EMBED_API_KEY"
            exit 1
          fi
          MODEL="${EVAL_EMBED_MODEL:-text-embedding-3-small}"
          DIMS="${EVAL_EMBED_DIMENSIONS:-1536}"
          cat > .github/eval-quality-config.json <<EOF
          {
            "embeddingProvider": "custom",
            "customProvider": {
              "baseUrl": "${EVAL_EMBED_BASE_URL}",
              "apiKey": "${EVAL_EMBED_API_KEY}",
              "model": "${MODEL}",
              "dimensions": ${DIMS},
              "timeoutMs": 30000
            },
            "indexing": {
              "autoIndex": false,
              "watchFiles": false,
              "respectGitignore": true,
              "semanticOnly": false,
              "requireProjectMarker": false
            },
            "search": {
              "maxResults": 10,
              "minScore": 0,
              "hybridWeight": 0.4,
              "fusionStrategy": "rrf",
              "rrfK": 60,
              "rerankTopN": 20,
              "enableCrossLanguage": true
            },
            "debug": {
              "enabled": false,
              "logLevel": "info",
              "metrics": true
            }
          }
          EOF

      - name: Run eval quality gate (real provider config required)
        run: npx tsx src/cli.ts eval run --config .github/eval-quality-config.json --reindex --ci --budget benchmarks/budgets/default.json --against benchmarks/baselines/eval-baseline-summary.json

      - name: Cleanup eval quality config
        if: always()
        run: rm -f .github/eval-quality-config.json
